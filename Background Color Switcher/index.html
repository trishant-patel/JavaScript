<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Background Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="heading">
            <h2>Color Scheme Switcher</h2>
        </div>

        <div class="boxes">
            <div class="button" id="grey"></div>
            <div class="button" id="white"></div>
            <div class="button" id="blue"></div>
            <div class="button" id="yellow"></div>
        </div>

        <div class="subHeading">
            <h3>Try clicking on one of the boxes to change the background color!</h3>
        </div>

    </div>

    <script src="working.js"></script>
</body>

</html>
